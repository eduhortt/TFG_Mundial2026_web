<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Predicción</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #060810;
    --surface:   #0d1117;
    --card:      #111620;
    --border:    #1e2530;
    --accent:    #c8a84b;
    --accent2:   #e8c96a;
    --green:     #2ecc71;
    --red:       #e74c3c;
    --blue:      #3498db;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --win:       #1a3a2a;
    --lose:      #2a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(200,168,75,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(52,152,219,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid var(--border);
  }

  .header-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 15vw, 160px);
    line-height: 0.85;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, #fff5d0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 4vw, 32px);
    letter-spacing: 8px;
    color: var(--muted);
    margin-top: 4px;
  }

  .header-tag {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 16px;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 3px;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
  }

  /* ── NAV ── */
  nav {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 32px 24px 0;
  }

  .nav-btn {
    position: relative;
    padding: 14px 48px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .nav-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  .nav-btn:hover { color: var(--text); border-color: var(--accent); }
  .nav-btn:hover::after { transform: scaleX(1); }

  .nav-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .nav-btn.active::after { display: none; }

  /* ── MAIN CONTENT ── */
  main {
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .view { display: none; animation: fadeIn 0.4s ease; }
  .view.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── GRUPOS GRID ── */
  .grupos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
  }

  .grupo-card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .grupo-card:hover { border-color: var(--accent); }

  .grupo-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .grupo-letra {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    color: var(--accent);
    width: 40px;
  }

  .grupo-equipos {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }

  .grupo-equipo-name {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .grupo-partidos { padding: 12px 0; }

  .partido-row {
    display: flex;
    align-items: center;
    padding: 8px 20px;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  .partido-row:last-child { border-bottom: none; }
  .partido-row:hover { background: rgba(255,255,255,0.02); }

  .partido-fecha {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    width: 52px;
    flex-shrink: 0;
  }

  .partido-home {
    flex: 1; text-align: right; font-size: 12px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .partido-score {
    display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; width: 60px; justify-content: center;
  }

  .score-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 7px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; font-weight: 500;
    min-width: 24px; text-align: center;
  }
  .score-box.win  { border-color: var(--green); color: var(--green); background: var(--win); }
  .score-box.lose { border-color: var(--red);   color: var(--red);   background: var(--lose); }
  .score-sep { color: var(--muted); font-size: 10px; }

  .partido-away {
    flex: 1; text-align: left; font-size: 12px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .prob-bar-wrap { width: 60px; flex-shrink: 0; }
  .prob-bar {
    height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden; display: flex; gap: 1px;
  }
  .prob-h { background: var(--green); }
  .prob-d { background: var(--muted); }
  .prob-a { background: var(--red); }

  .grupo-tabla {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    background: rgba(0,0,0,0.2);
  }

  .tabla-title {
    font-size: 9px; font-family: 'DM Mono', monospace;
    letter-spacing: 2px; color: var(--muted);
    margin-bottom: 8px; text-transform: uppercase;
  }

  .tabla-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0; font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .tabla-row:last-child { border-bottom: none; }
  .tabla-pos { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 16px; }
  .tabla-equipo { flex: 1; font-weight: 500; }
  .tabla-badge { font-size: 9px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 2px; }
  .badge-pasa    { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
  .badge-tercero { background: rgba(200,168,75,0.15);  color: var(--accent); border: 1px solid rgba(200,168,75,0.3); }
  .badge-elim    { background: rgba(231,76,60,0.1);    color: var(--red);    border: 1px solid rgba(231,76,60,0.2); }

  /* ── FASE FINAL ── */
  .fase-section { margin-bottom: 48px; }

  .fase-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 4px;
    color: var(--accent);
    border-left: 3px solid var(--accent);
    padding-left: 16px; margin-bottom: 20px;
  }

  .partidos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }

  .partido-elim {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px 20px;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }

  .partido-elim::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--border); transition: background 0.2s;
  }

  .partido-elim:hover { border-color: var(--accent); }
  .partido-elim:hover::before { background: var(--accent); }

  .partido-elim-meta {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }

  .partido-id {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--accent); letter-spacing: 1px;
  }

  .partido-fecha-elim {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted);
  }

  .partido-estadio {
    font-size: 10px; color: var(--muted);
    margin-bottom: 14px;
  }

  .partido-equipos {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px; margin-bottom: 12px;
  }

  .eq-home { text-align: right; }
  .eq-away { text-align: left; }

  .eq-name { font-weight: 600; font-size: 14px; line-height: 1.2; }
  .eq-name.ganador  { color: var(--accent2); }
  .eq-name.perdedor { color: var(--muted); }
  .eq-goles { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

  .vs-score {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }

  .vs-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; line-height: 1;
    letter-spacing: 2px; color: var(--text);
  }

  .probs-row {
    display: flex; border: 1px solid var(--border);
    overflow: hidden; border-radius: 2px;
  }

  .prob-seg {
    padding: 3px 0; font-size: 9px;
    font-family: 'DM Mono', monospace;
    text-align: center; transition: background 0.2s;
  }
  .prob-seg.ph { background: rgba(46,204,113,0.1);  color: var(--green); }
  .prob-seg.pd { background: rgba(107,114,128,0.1); color: var(--muted); }
  .prob-seg.pa { background: rgba(231,76,60,0.1);   color: var(--red); }

  .avanza-tag {
    display: inline-block; margin-top: 10px;
    padding: 3px 10px; font-size: 9px;
    font-family: 'DM Mono', monospace; letter-spacing: 1px;
    background: rgba(200,168,75,0.1); color: var(--accent);
    border: 1px solid rgba(200,168,75,0.3);
  }

  /* ── FINAL ── */
  .final-card {
    max-width: 560px; margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--accent);
    padding: 32px; position: relative;
    overflow: hidden; text-align: center;
  }

  .final-card::after {
    content: 'FINAL';
    position: absolute; top: -10px; right: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px; color: rgba(200,168,75,0.04);
    letter-spacing: 4px; pointer-events: none;
  }

  .final-trophy { font-size: 48px; margin-bottom: 16px; }

  .final-equipos {
    display: flex; align-items: center;
    justify-content: center; gap: 24px; margin: 20px 0;
  }

  .final-eq { flex: 1; max-width: 180px; }

  .final-eq-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 2px; line-height: 1.1;
  }
  .final-eq-name.campeon    { color: var(--accent2); }
  .final-eq-name.subcampeon { color: var(--muted); }

  .final-resultado {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; color: var(--text); letter-spacing: 4px;
  }

  .final-meta {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--muted); margin-top: 16px;
  }

  /* ── PODIO ── */
  .podio {
    display: flex; justify-content: center;
    align-items: flex-end; gap: 8px;
    margin: 40px auto 0; max-width: 500px;
  }

  .podio-item {
    flex: 1; text-align: center;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px 8px 12px;
  }
  .podio-item.p1 { border-color: var(--accent); padding-top: 28px; }
  .podio-item.p2 { order: -1; }
  .podio-item.p3 { order: 1; }

  .podio-medal { font-size: 24px; margin-bottom: 6px; }
  .podio-name  { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; line-height: 1.1; }
  .podio-pos   { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; }

  /* ── SELECCIONES ── */
  .sel-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px; min-height: 600px;
  }

  .sel-lista {
    background: var(--card);
    border: 1px solid var(--border);
    overflow-y: auto; max-height: 80vh;
    position: sticky; top: 20px;
  }

  .sel-lista-title {
    padding: 14px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    position: sticky; top: 0;
    background: var(--card); z-index: 1;
  }

  .sel-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.15s; font-size: 13px;
  }
  .sel-item:hover { background: rgba(255,255,255,0.04); }
  .sel-item.active {
    background: rgba(200,168,75,0.1);
    border-left: 2px solid var(--accent);
    color: var(--accent2);
  }

  .sel-flag { font-size: 20px; line-height: 1; }
  .sel-grupo-badge {
    margin-left: auto; font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted); background: var(--surface);
    padding: 2px 6px; border: 1px solid var(--border);
  }

  .sel-panel { min-height: 400px; }

  .sel-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 400px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 13px; gap: 12px;
  }

  .sel-header-panel {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 24px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sel-flag-big { font-size: 48px; line-height: 1; }

  .sel-header-info h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 3px; line-height: 1;
  }

  .sel-header-stats { display: flex; gap: 24px; margin-top: 8px; flex-wrap: wrap; }

  .sel-stat { display: flex; flex-direction: column; gap: 2px; }
  .sel-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); line-height: 1; }
  .sel-stat-lbl { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .sel-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 3px;
    color: var(--accent); margin: 24px 0 12px;
    border-left: 3px solid var(--accent); padding-left: 12px;
  }

  .jugadores-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .jugador-card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden; transition: all 0.2s; position: relative;
  }
  .jugador-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .jugador-foto-wrap {
    position: relative; height: 120px;
    background: linear-gradient(135deg, var(--surface) 0%, var(--border) 100%);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }

  .jugador-foto {
    width: auto; height: 100%; max-width: 100%;
    object-fit: contain; object-position: center top;
    margin: 0 auto; display: block;
  }

  .jugador-avatar {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--muted); letter-spacing: 2px;
  }

  .jugador-ovr {
    position: absolute; top: 6px; left: 6px;
    background: var(--accent); color: var(--bg);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; padding: 1px 6px; line-height: 1.3;
  }

  .jugador-slot {
    position: absolute; top: 6px; right: 6px;
    background: rgba(0,0,0,0.7); color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 9px; padding: 2px 5px; border: 1px solid var(--border);
  }

  .jugador-info { padding: 10px 12px; }

  .jugador-nombre {
    font-weight: 600; font-size: 12px; line-height: 1.2; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .jugador-pos {
    font-size: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .jugador-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }

  .jstat { display: flex; flex-direction: column; gap: 1px; }
  .jstat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
  .jstat-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .jugador-liga {
    margin-top: 8px; font-size: 9px;
    font-family: 'DM Mono', monospace; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .jugador-liga.top5 { color: var(--accent); }

  .jugador-fc-badge {
    position: absolute; bottom: 6px; right: 6px; font-size: 8px;
    background: rgba(200,168,75,0.15); color: var(--accent);
    border: 1px solid rgba(200,168,75,0.3);
    padding: 1px 4px; font-family: 'DM Mono', monospace;
  }

  /* ── DESPLEGABLE JUGADOR ── */
  .jugador-detalles {
    margin-top: 6px;
    font-size: 11px;
  }
  .jugador-detalles summary {
    cursor: pointer;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 0;
    user-select: none;
  }
  .jugador-detalles summary:hover { color: var(--accent); }
  .jugador-detalles[open] summary { color: var(--accent); }
  .jugador-stats-extra {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  /* ── PRONÓSTICO ── */
  .pronostico-table {
    width: 100%;
    border-collapse: collapse;
  }

  .pronostico-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
  }

  .pronostico-table th:first-child,
  .pronostico-table th:nth-child(2) { text-align: left; }

  .pronostico-table td {
    padding: 9px 14px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    text-align: right;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .pronostico-table td:nth-child(2) { text-align: left; color: var(--text); font-weight: 500; font-family: 'DM Sans', sans-serif; }
  .pronostico-table td:first-child  { text-align: left; color: var(--muted); width: 36px; }

  .pronostico-table tr:hover td { background: rgba(255,255,255,0.02); }

  .pron-pos  { font-family: 'DM Mono', monospace; font-size: 11px; }
  .pron-camp { color: var(--accent) !important; font-weight: 700; }

  .pron-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .pron-bar {
    width: 80px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .pron-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }

  .pronostico-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .pronostico-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 4px; color: var(--accent);
    border-left: 3px solid var(--accent); padding-left: 16px;
  }

  .pronostico-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 2px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sel-layout { grid-template-columns: 1fr; }
    .sel-lista { max-height: 200px; position: static; }
    .jugadores-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

  } catch(_) {}
  return DATOS_EJEMPLO;
}

function renderPronostico() {
  const datos = typeof DATOS_EJEMPLO !== 'undefined' ? DATOS_EJEMPLO : null;
  if (!datos) return;
  const mc    = datos.monte_carlo || {};
  const tbody = document.getElementById('pronostico-tbody');
  if (!tbody || !Object.keys(mc).length) return;

  const equipos = Object.entries(mc)
    .map(([eq, p]) => ({ eq, ...p }))
    .sort((a, b) => b.campeon - a.campeon);

  const maxCamp = equipos[0]?.campeon || 1;

  tbody.innerHTML = equipos.map((e, i) => {
    const pct = v => v != null ? v.toFixed(1) + '%' : '—';
    const barW = Math.round((e.campeon / maxCamp) * 100);
    return `
      <tr>
        <td class="pron-pos">${i + 1}</td>
        <td>${e.eq}</td>
        <td class="pron-camp">
          <div class="pron-bar-wrap">
            <div class="pron-bar"><div class="pron-bar-fill" style="width:${barW}%"></div></div>
            ${pct(e.campeon)}
          </div>
        </td>
        <td>${pct(e.finalista)}</td>
        <td>${pct(e.semifinalista)}</td>
        <td>${pct(e.cuartos)}</td>
        <td>${pct(e.octavos)}</td>
        <td>${pct(e['16avos'])}</td>
      </tr>`;
  }).join('');
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  event.target.classList.add('active');
  if (id === 'pronostico') renderPronostico();
}

//  RENDER GRUPOS
// ════════════════════════════════════════════════════════════════════

function renderGrupos(datos) {
  const torneo = datos.prediccion_torneo;
  const mc     = datos.monte_carlo || {};
  const grid   = document.getElementById('grupos-grid');
  grid.innerHTML = '';

  for (const [letra, tabla] of Object.entries(torneo.tablas_grupos)) {
    const partidos = torneo.fase_grupos[letra] || [];

    // Card
    const card = document.createElement('div');
    card.className = 'grupo-card';

    // Header
    const equiposHtml = tabla.map(r =>
      `<span class="grupo-equipo-name">${r.equipo}</span>`
    ).join('');

    card.innerHTML = `
      <div class="grupo-header">
        <div class="grupo-letra">${letra}</div>
        <div class="grupo-equipos">${equiposHtml}</div>
      </div>
      <div class="grupo-partidos">
        ${partidos.map(p => renderPartidoGrupo(p)).join('')}
      </div>
      <div class="grupo-tabla">
        <div class="tabla-title">Clasificación esperada</div>
        ${tabla.map(r => renderTablaRow(r, mc)).join('')}
      </div>
    `;
    grid.appendChild(card);
  }
}

function renderPartidoGrupo(p) {
  const [gh, ga] = p.resultado_esperado.split('-').map(Number);
  const hClass = gh > ga ? 'win' : (gh < ga ? 'lose' : '');
  const aClass = ga > gh ? 'win' : (ga < gh ? 'lose' : '');
  const ph = Math.round(p.p_home * 100);
  const pd = Math.round(p.p_draw * 100);
  const pa = 100 - ph - pd;

  return `
    <div class="partido-row">
      <span class="partido-fecha">${p.fecha || ''}</span>
      <span class="partido-home">${p.home}</span>
      <div class="partido-score">
        <span class="score-box ${hClass}">${gh}</span>
        <span class="score-sep">–</span>
        <span class="score-box ${aClass}">${ga}</span>
      </div>
      <span class="partido-away">${p.away}</span>
      <div class="prob-bar-wrap">
        <div class="prob-bar">
          <div class="prob-h" style="width:${ph}%"></div>
          <div class="prob-d" style="width:${pd}%"></div>
          <div class="prob-a" style="width:${pa}%"></div>
        </div>
      </div>
    </div>
  `;
}

function renderTablaRow(r, mc) {
  const badge = r.pos <= 2
    ? `<span class="tabla-badge badge-pasa">PASA</span>`
    : r.pos === 3
      ? `<span class="tabla-badge badge-tercero">3º</span>`
      : `<span class="tabla-badge badge-elim">ELIM</span>`;
  return `
    <div class="tabla-row">
      <span class="tabla-pos">${r.pos}º</span>
      <span class="tabla-equipo">${r.equipo}</span>
      ${badge}
    </div>
  `;
}

function renderFaseFinal(datos) {
  const elim   = datos.prediccion_torneo.eliminatorias;
  const torneo = datos.prediccion_torneo;
  const cont   = document.getElementById('bracket-container');
  cont.innerHTML = '';

  const fases = [
    { key: '16avos',        label: 'DIECISEISAVOS DE FINAL',   cols: 4 },
    { key: 'octavos',       label: 'OCTAVOS DE FINAL',          cols: 4 },
    { key: 'cuartos',       label: 'CUARTOS DE FINAL',          cols: 2 },
    { key: 'semifinal',     label: 'SEMIFINALES',               cols: 2 },
    { key: 'tercer_puesto', label: 'TERCER Y CUARTO PUESTO',    cols: 1 },
    { key: 'final',         label: 'GRAN FINAL',                cols: 1 },
  ];

  for (const fase of fases) {
    const partidos = elim[fase.key] || [];
    if (!partidos.length) continue;

    const sec = document.createElement('div');
    sec.className = 'fase-section';

    const isFinal = fase.key === 'final';

    if (isFinal) {
      const p = partidos[0];
      const real = datos.prediccion_torneo;
      sec.innerHTML = `
        <div class="fase-title">${fase.label}</div>
        <div class="final-card">
          <div class="final-trophy">🏆</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:8px;">${p.fecha} · ${p.estadio}</div>
          <div class="final-equipos">
            <div class="final-eq">
              <div class="final-eq-name campeon">${real.campeon}</div>
              <div style="font-size:11px;color:var(--accent);margin-top:4px;">🏆 CAMPEÓN</div>
            </div>
            <div class="final-resultado">${p.resultado_esperado}</div>
            <div class="final-eq">
              <div class="final-eq-name subcampeon">${real.subcampeon}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px;">🥈 Subcampeón</div>
            </div>
          </div>
          <div class="final-meta">
            Local ${(p.p_home*100).toFixed(1)}% · Empate ${(p.p_draw*100).toFixed(1)}% · Visita ${(p.p_away*100).toFixed(1)}%
          </div>
        </div>
        <div class="podio">
          <div class="podio-item p2">
            <div class="podio-medal">🥈</div>
            <div class="podio-name">${real.subcampeon}</div>
            <div class="podio-pos">2º puesto</div>
          </div>
          <div class="podio-item p1">
            <div class="podio-medal">🏆</div>
            <div class="podio-name">${real.campeon}</div>
            <div class="podio-pos">CAMPEÓN</div>
          </div>
          <div class="podio-item p3">
            <div class="podio-medal">🥉</div>
            <div class="podio-name">${real.tercer_puesto}</div>
            <div class="podio-pos">3º puesto</div>
          </div>
        </div>
      `;
    } else {
      const cols = Math.min(fase.cols, partidos.length);
      sec.innerHTML = `
        <div class="fase-title">${fase.label}</div>
        <div class="partidos-grid" style="grid-template-columns:repeat(${cols},1fr)">
          ${partidos
            .sort((a,b) => a.partido_id - b.partido_id)
            .map(p => renderPartidoElim(p))
            .join('')}
        </div>
      `;
    }
    cont.appendChild(sec);
  }
}

function renderPartidoElim(p) {
  const [gh, ga] = p.resultado_esperado.split('-').map(Number);
  const ph = (p.p_home * 100).toFixed(0);
  const pd = (p.p_draw * 100).toFixed(0);
  const pa = (p.p_away * 100).toFixed(0);
  const phW = (p.p_home * 100).toFixed(0);
  const pdW = (p.p_draw * 100).toFixed(0);
  const paW = (100 - p.p_home * 100 - p.p_draw * 100).toFixed(0);

  return `
    <div class="partido-elim">
      <div class="partido-elim-meta">
        <span class="partido-id">P${p.partido_id}</span>
        <span class="partido-fecha-elim">${p.fecha || ''}</span>
      </div>
      <div class="partido-estadio">📍 ${p.estadio || ''}</div>
      <div class="partido-equipos">
        <div class="eq-home">
          <div class="eq-name ${p.ganador === p.home ? 'ganador' : 'perdedor'}">${p.home}</div>
          <div class="eq-goles">${p.goles_esp_home.toFixed(2)} goles esp.</div>
        </div>
        <div class="vs-score">
          <div class="vs-num">${gh}–${ga}</div>
        </div>
        <div class="eq-away">
          <div class="eq-name ${p.ganador === p.away ? 'ganador' : 'perdedor'}">${p.away}</div>
          <div class="eq-goles">${p.goles_esp_away.toFixed(2)} goles esp.</div>
        </div>
      </div>
      <div class="probs-row">
        <div class="prob-seg ph" style="width:${phW}%">${ph}%</div>
        <div class="prob-seg pd" style="width:${pdW}%">${pd}%</div>
        <div class="prob-seg pa" style="width:${paW}%">${pa}%</div>
      </div>
      <div class="avanza-tag">✅ AVANZA: ${p.ganador}</div>
    </div>
  `;
}

function banderaImg(codigo, size) {
  if (!codigo) return '';
  const s = size || 24;
  return `<img src="https://flagcdn.com/${s}x${Math.round(s*0.75)}/${codigo}.png" 
               alt="${codigo}" style="width:${s}px;height:auto;vertical-align:middle;border-radius:2px;"
               onerror="this.style.display='none'">`;
}

let datosSelecciones = null;

function renderListaSelecciones(datos) {
  datosSelecciones = datos;
  const grupos = datos.prediccion_torneo?.tablas_grupos || {};
  // Mapear equipo → grupo
  const equipoGrupo = {};
  for (const [g, tabla] of Object.entries(grupos)) {
    for (const r of tabla) equipoGrupo[r.equipo] = g;
  }

  const lista = document.getElementById('sel-lista-items');
  lista.innerHTML = '';
  const equipos = Object.keys(equipoGrupo).sort((a,b) => a.localeCompare(b));

  for (const equipo of equipos) {
    const div = document.createElement('div');
    div.className = 'sel-item';
    div.dataset.equipo = equipo;
    div.innerHTML = `
      ${banderaImg(BANDERAS[equipo])}
      <span>${equipo}</span>
      <span class="sel-grupo-badge">Gr. ${equipoGrupo[equipo]}</span>
    `;
    div.onclick = () => mostrarSeleccion(equipo, div);
    lista.appendChild(div);
  }
}

function mostrarSeleccion(nombre, itemEl) {
  document.querySelectorAll('.sel-item').forEach(i => i.classList.remove('active'));
  itemEl.classList.add('active');

  // Esperar a que _selData esté disponible (puede estar al final del HTML)
  function intentar(intentos) {
    if (window._selData && window._selData[nombre]) {
      renderPanelSeleccion(nombre, window._selData[nombre]);
      return;
    }
    if (window._selData && !window._selData[nombre]) {
      document.getElementById('sel-panel').innerHTML =
        '<div class="sel-empty"><span>⚠️ Sin datos para ' + nombre + '</span></div>';
      return;
    }
    if (intentos > 20) {
      // Último recurso: fetch
      fetch('data/mundial_selecciones.json')
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(d => { window._selData = d; renderPanelSeleccion(nombre, d[nombre]); })
        .catch(() => {
          document.getElementById('sel-panel').innerHTML =
            '<div class="sel-empty"><span>⚠️ Ejecuta primero: python incrustar_json.py</span></div>';
        });
      return;
    }
    setTimeout(() => intentar(intentos + 1), 50);
  }
  intentar(0);
}

function renderPanelSeleccion(nombre, data) {
  const panel = document.getElementById('sel-panel');
  if (!data || data.error) {
    panel.innerHTML = `<div class="sel-empty"><span>⚠️ Sin datos para ${nombre}</span></div>`;
    return;

  const titulares = data.titulares || [];

  // Manejar errores de carga de imágenes
  panel.querySelectorAll('.jugador-foto').forEach(img => {
    img.onerror = function() {
      const wrap = this.parentElement;
      const nombre = wrap.dataset.nombre || '?';

      this.remove();
      wrap.innerHTML += `<div class="jugador-avatar">${iniciales}</div>`;
    };
  });
}

function renderJugadorCard(j) {
  const iniciales = j.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const fotoHtml = j.photo_url
    ? `<img class="jugador-foto" src="${j.photo_url}" alt="${j.name}" loading="lazy">`

  const ligaClass = j.top5_league ? 'jugador-liga top5' : 'jugador-liga';
  const fcBadge = j.fc_fallback ? '<div class="jugador-fc-badge">FC</div>' : '';
  const min2526 = j.minutes_2526 ?? j.minutes_2425 ?? 0;

  return `
    <div class="jugador-card">
      <div class="jugador-foto-wrap" data-nombre="${j.name}">
        ${fotoHtml}
        <div class="jugador-ovr">${j.overall}</div>

          </div>
          <div class="jstat">
            <span class="jstat-val">${min2526}</span>
            <span class="jstat-lbl">Min 25/26</span>
          </div>
          <div class="jstat">
            <span class="jstat-val">${j.score.toFixed(1)}</span>
            <span class="jstat-lbl">Score</span>
          </div>
        </div>
        <details class="jugador-detalles">
          <summary>Ver más</summary>

            <div class="jstat">
              <span class="jstat-val">${j.goals_2425}</span>

            <div class="jstat">
              <span class="jstat-val">${j.assists_2425}</span>

            </div>
            <div class="jstat">

            </div>
            <div class="jstat">

              <span class="jstat-lbl">Overall</span>
            </div>
          </div>
        </details>
        <div class="${ligaClass}">${j.league || '—'}</div>
      </div>
    </div>
  `;
}
